name: Morning Digest

on:
  schedule:
    # Runs at 6:00 AM UTC daily — adjust to your timezone:
    # 6:00 AM IST  = 0:30 UTC  → change to: '30 0 * * *'
    # 6:00 AM EST  = 11:00 UTC → change to: '0 11 * * *'
    # 6:00 AM PST  = 14:00 UTC → change to: '0 14 * * *'
    - cron: '0 14 * * *'   # default: 6:00 AM IST

  workflow_dispatch:  # allows manual trigger from GitHub UI (great for testing!)

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run digest agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.sk-ant-api03-TJK...zgAA }}
          GMAIL_USER:        ${{ secrets.morning-digest }}
          GMAIL_APP_PASS:    ${{ secrets.ydsn kenk qoca fvoh }}
          TO_EMAIL:          ${{ secrets.kumar.x.sooraj@gmail.com }}
        run: python digest.py
